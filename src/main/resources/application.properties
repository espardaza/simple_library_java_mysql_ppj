# 1. Connection address (URL) - Most important
spring.datasource.url=jdbc:mysql://localhost:3306/library_db

# 2. Username (Default is root)
spring.datasource.username=root

# 3. Password (MySQL)
spring.datasource.password=123456

# 4. Automatically generate tables from Java code (to save you from writing manual table creation code).
spring.jpa.hibernate.ddl-auto=update

# 5. Display the SQL statement on the screen for easy verification.
spring.jpa.show-sql=true

